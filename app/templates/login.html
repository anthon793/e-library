{% extends "base.html" %}

{% block title %}Login — Academic E-Library{% endblock %}

{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block body %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">📚</div>
      <h1>Welcome Back</h1>
      <p>Sign in to access the academic library</p>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px;">Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
